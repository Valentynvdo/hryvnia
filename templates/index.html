            }

            .menu ul {

            .menu ul li {

            .close-button {

                right: 20px; /* Відстань від правого краю */
                font-size: 24px; /* Розмір шрифта */
                color: #000; /* Колір тексту */
                cursor: pointer; /* Курсор у вигляді руки */
                background: none; /* Без фону */
                border: none; /* Без обводки */
                z-index: 10000;
            }
          
          #connect-button {
    color: white; /* Колір тексту */
    font-size: 16px; /* Розмір тексту */
    padding: 12px 24px; /* Відступи всередині кнопки */
    border: none; /* Відсутність рамки */
    border-radius: 5px; /* Закруглені краї */
    cursor: grab; /* Курсор для перетягування */
    position: absolute; /* Для можливості переміщення */
    top: 230px; /* Відстань зверху */
    left: 95px; /* Відстань зліва */
    z-index: 1000; /* Щоб кнопка була поверх інших елементів */
}
          body {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    background-color: #f0f0f0;
}
    
          /* Mining Section */
            .start-mining-btn {
                position: relative;
                background-color: #BDB76B;
                font-size: 18px;
                padding: 10px;
                border-radius: 15px;
                border: none;
                cursor: pointer;
                width: 95%;
                box-shadow: 0 0 60px rgba(189, 183, 107, 0.9); /* Світіння */
                transition: box-shadow 0.3s ease; /* Плавний перехід */

                top: -40px;
              }

          
           #coin-balance {
                opacity: 1;

                font-size: 38px;
                font-weight: bold;
                color: #ffffff;
                margin-top: 30px;
                text-align: right;
                margin-left: 120px;
                top: 12px;
            }
          
          #mining-timer {
    position: absolute;
    color: #808080; /* Білий колір для таймера */

    font-weight: bold;
    margin-left: 20px; /* Відстань від балансу */
    top: 100px;
    left: 270px;
}
    .menu-container {
    left: 25px;
    position: relative;
    display: flex; 
    flex-wrap: wrap; 
    justify-content: center; /* Центруємо кнопки */
    margin: -60px; 
    max-width: 450px; /* Зменшено максимальну ширину контейнера */
}

.menu-button {
    font-size: 52px; /* Розмір іконки */
    width: 80px; /* Ширина кнопки */
    height: 60px; /* Висота кнопки */
    background-color: #333333; /* Прозорий фон */
    color: #FFFFFF;
    border: none; /* Без обрамлення */
    border-radius: 10px; /* Злегка закруглені кути */
    display: flex; /* Використовуємо флекс-контейнер */
    flex-direction: column; /* Вирівнюємо в стовпчик */
    align-items: center; /* Центруємо по горизонталі */
    justify-content: center; /* Центруємо по вертикалі */
    box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2); /* Ефект глибини */
    cursor: pointer; /* Курсор у вигляді руки */

}

.menu-button:hover {

.menu-button span {
    margin-top: 5px; /* Відстань між іконкою та текстом */

    body {
        /* стилі для портретної орієнтації */
    }

<body>
<!-- Кнопка-гамбургер -->
<div class="hamburger" onclick="toggleMenu()">
    <div class="line"></div>
    <div class="line"></div>
    <div class="line"></div>
</div>

<!-- Вікно меню -->
<div id="menu" class="menu">
    <div class="modal">
        <span class="close-button" onclick="closeModal()">×</span> <!-- Кнопка закриття -->
        <div class="modal-content">
            <ul>
              <li><a href="#">Пункт 1</a></li>
              <li><a href="#">Пункт 2</a></li>                <li><a href="#">Пункт 3</a></li>
            </ul>
        </div>
    </div>
</div>
 
<div class="app-container">
    <!-- Header Section with Image -->
    <div class="header">
        <img src="https://i.ibb.co/712Bg0T/IMG-3959.png" alt="Wallet Header" class="header-image"> 
     
     <div id="connect-button"></div> 
  
  <!-- Start Mining Button -->
<div class="mining-section">
    <button class="start-mining-btn" id="start-mining-btn">Start Mining</button>
</div>
      
      <div>
    <div class="resizable-container">
            <span id="coin-balance"style="color: #ffffff;">0</span>
            <span id="mining-timer">0.00</span>
        <!-- Вміст контейнера -->
  </div>
        
 <div class="menu-container">
    <button class="menu-button bank" onclick="openModal('modal-bank')">
        <span>🏦</span>
        <span>Банк</span>
    </button>
    <button class="menu-button wallet" onclick="openModal('modal-wallet')">
        <span>👛</span>
        <span>Гаманець</span>
    </button>
    <button class="menu-button earn" onclick="openModal('modal-earn')">
        <span>💰</span>
        <span>Заробіток</span>
    </button>
    <button class="menu-button friends" onclick="openModal('modal-friends')">
        <span>👬</span>
        <span>Друзі</span>
    </button>
      <button class="menu-button settings" onclick="openModal('modal-settings')">
        <span>🛠️</span>
        <span>Налаштування</span>
    </button>
      <button class="menu-button roadmap" onclick="openModal('modal-roadmap')">
        <span>🗺️</span>
        <span>Дорожня карта</span>
    </button>
</div>
  
  <script>
    
   // Ініціалізація TonConnectUI
const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
    manifestUrl: 'https://ton-connect.github.io/demo-dapp-with-react-ui/tonconnect-manifest.json',
    buttonRootId: 'connect-button'
});

// Відслідковування статусу підключення
tonConnectUI.onStatusChange(status => {
    console.log(status); // Логування статусу
    if (status.connected) {
        alert(`Connected: ${status.address}`);
    } else {
        alert("Disconnected");
    }
});

// Функції для роботи з меню
function closeModal() {
    document.getElementById("menu").style.display = "none"; // Сховати меню
}

function toggleMenu() {
    const menu = document.getElementById("menu");
    menu.style.display = menu.style.display === "block" ? "none" : "block"; // Toggle menu
}

// Змінні для відстеження балансу та видобутку
let balance = 0;
const miningDuration = 8000; // 8 секунд
const miningPoints = 19;

// Знайти елементи на сторінці
const balanceDisplay = document.getElementById("coin-balance");
const startMiningButton = document.getElementById("start-mining-btn");
const miningTimerDisplay = document.getElementById("mining-timer");
const transferTableBody = document.querySelector("#transfer-table tbody");

// Додавання обробника для кнопки початку видобутку
startMiningButton.addEventListener("click", () => {
    startMiningButton.disabled = true; // Вимкнути кнопку
    startMiningButton.textContent = "Mining in progress ⛏️...";

    let remainingTime = miningDuration; // Залишковий час
    const interval = 100; // Оновлення таймера кожні 100 мс

    // Очищення попереднього значення таймера
    miningTimerDisplay.textContent = (remainingTime / 1000).toFixed(2); // Відображаємо 8 секунд

    const timer = setInterval(() => {
        remainingTime -= interval; // Зменшуємо залишковий час
        const seconds = (remainingTime / 1000).toFixed(2); // Форматування до двох десяткових
        miningTimerDisplay.textContent = seconds; // Оновлення таймера

        // Якщо час вичерпано, зупиняємо таймер
        if (remainingTime <= 0) {
            clearInterval(timer);
            remainingTime = 0; // Гарантуємо, що залишковий час не буде меншим за 0
            miningTimerDisplay.textContent = (remainingTime / 1000).toFixed(2); // Оновлюємо таймер до 0
        }
    }, interval);

    setTimeout(() => {
        clearInterval(timer); // Зупинити таймер
        balance += miningPoints; // Додати монети до балансу
        balanceDisplay.textContent = balance.toFixed(2); // Оновити відображення балансу
        startMiningButton.disabled = false; // Увімкнути кнопку
        startMiningButton.textContent = "Start Mining"; // Відновити текст кнопки
    }, miningDuration);
});
    
   
    
    </script>
</body>
